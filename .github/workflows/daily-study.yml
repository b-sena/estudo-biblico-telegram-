name: 📖 Devocional Diário

on:
  schedule:
    # Todo dia às 07:00 (horário de Brasília = UTC-3, então 10:00 UTC)
    - cron: "0 5 * * *"
  workflow_dispatch:

jobs:
  enviar-estudo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install requests

      - name: Gerar e enviar devocional
        env:
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          EVOLUTION_URL:       ${{ secrets.EVOLUTION_URL }}
          EVOLUTION_APIKEY:    ${{ secrets.EVOLUTION_APIKEY }}
          EVOLUTION_INSTANCE:  ${{ secrets.EVOLUTION_INSTANCE }}
          EVOLUTION_PHONE_1:   ${{ secrets.EVOLUTION_PHONE_1 }}
          # EVOLUTION_PHONE_2:   ${{ secrets.EVOLUTION_PHONE_2 }}
          EVOLUTION_COMMUNITY: ${{ secrets.EVOLUTION_COMMUNITY }}
          # Para ativar o grupo, remova o comentário abaixo:
          # EVOLUTION_GROUP:   ${{ secrets.EVOLUTION_GROUP }}
        run: python main.py