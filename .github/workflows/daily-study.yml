name: 📖 Estudo Bíblico Diário

on:
  schedule:
    # Todo dia às 07:00 (horário de Brasília = 10:00 UTC)
    - cron: "0 5 * * *"
  workflow_dispatch:

jobs:
  enviar-estudo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install requests google-genai

      - name: Gerar e enviar estudo bíblico
        env:
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          WPPCONNECT_URL:     ${{ secrets.WPPCONNECT_URL }}
          WPPCONNECT_TOKEN:   ${{ secrets.WPPCONNECT_TOKEN }}
          WPPCONNECT_SESSION: ${{ secrets.WPPCONNECT_SESSION }}
          WPPCONNECT_PHONE_1: ${{ secrets.WPPCONNECT_PHONE_1 }}
          WPPCONNECT_PHONE_2: ${{ secrets.WPPCONNECT_PHONE_2 }}
          # Para ativar o grupo, remova o comentário abaixo:
          # WPPCONNECT_GROUP: ${{ secrets.WPPCONNECT_GROUP }}
        run: python main.py